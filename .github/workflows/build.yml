name: Build Loto Quine APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: 🐍 Installer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ☕ Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 🦋 Installer Flutter 3.27
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: 📦 Installer Flet
        run: pip install flet==0.24.1

      - name: 🔧 Accepter les licences Android
        run: yes | flutter doctor --android-licenses || true

      - name: 🏗️ Build APK
        run: flet build apk --project "LotoQuine" --org com.loto.quine --module-name main

      - name: 📤 Uploader l'APK
        uses: actions/upload-artifact@v4
        with:
          name: LotoQuine-APK
          path: build/apk/*.apk
          retention-days: 7
